version: "3.9"

# NOTE: This file is a trimmed, self-contained Supabase stack for S01.
# It is intentionally simplified and should be revisited against the
# official supabase/supabase self-hosted configuration in later slices.

services:
  supabase-db:
    image: supabase/postgres:15.1.0.68
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - supabase-db-data:/var/lib/postgresql/data

  supabase-rest:
    image: supabase/postgrest:v12.0.2
    restart: unless-stopped
    depends_on:
      - supabase-db
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}

  supabase-auth:
    image: supabase/gotrue:v2.158.0
    restart: unless-stopped
    depends_on:
      - supabase-db
    environment:
      GOTRUE_SITE_URL: ${APP_BASE_URL}
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_LOG_LEVEL: info

  supabase-storage:
    image: supabase/storage-api:v1.0.9
    restart: unless-stopped
    depends_on:
      - supabase-db
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB}
      PGOPTIONS: -c search_path=storage,public
      FILE_SIZE_LIMIT: 52428800

volumes:
  supabase-db-data:
